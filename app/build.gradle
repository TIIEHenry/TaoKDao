apply plugin: 'com.android.application'android {    namespace 'tiiehenry.ideditor'    compileSdk 36    defaultConfig {        applicationId "tiiehenry.taokdao"        minSdkVersion 28        targetSdkVersion 36//        versionCode sdk_versions.versionCode//        versionName sdk_versions.versionName//        versionCode new Date().format('yyMMdd').toInteger()//        versionName new Date().format('yy.MM.dd')        versionCode 201022        versionName "debug"        multiDexEnabled false        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"    }    sourceSets {        main {            res.srcDirs += 'src/main/res-content'            res.srcDirs += 'src/main/res-explorer'            res.srcDirs += 'src/main/res-tabtool'            res.srcDirs += 'src/main/res-codeeditor'            res.srcDirs += 'src/main/res-fileicon'            res.srcDirs += 'src/main/res-setting'            res.srcDirs += 'src/main/res-plugin'        }    }    buildTypes {//        common{//            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'//            multiDexEnabled false////        }        release {//            initWith common            minifyEnabled true            shrinkResources true  //移出无用资源            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'            multiDexEnabled false            zipAlignEnabled true            debuggable false            //在这里添加：            lintOptions {                checkReleaseBuilds false                abortOnError false            }//            applicationIdSuffix = ''            versionNameSuffix = 'alpha'//            manifestPlaceholders = [placeholder_fileprovider: "tiiehenry.taokdao.fileprovider"]        }        debug {//            initWith common//            shrinkResources true  //移出无用资源            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'            multiDexEnabled false            zipAlignEnabled false            debuggable true            minifyEnabled = false//            applicationIdSuffix = '.debug'//            versionNameSuffix = '.debug'//            defaultConfig.resConfig "zh"//            manifestPlaceholders = [placeholder_fileprovider: "tiiehenry.taokdao.fileprovider.debug"]        }    }    lintOptions {        checkReleaseBuilds false        abortOnError false    }    compileOptions {        sourceCompatibility JavaVersion.VERSION_17        targetCompatibility JavaVersion.VERSION_17    }    kotlin {        compilerOptions {            languageVersion = org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_2_3        }    }    buildFeatures {        viewBinding true        buildConfig  true    }}android.splits {    abi {        enable true//            exclude "armeabi-v7a"        reset()        include "arm64-v8a"/*,                    "x86",                    "x86_64"*/        universalApk true    }}android.packagingOptions {    exclude 'META-INF/LICENSE-LGPL-2.1.txt'    exclude 'META-INF/LICENSE-LGPL-3.txt'    exclude 'META-INF/LICENSE-W3C-TEST'    exclude 'META-INF/DEPENDENCIES'}dependencies {    implementation fileTree(include: ['*.jar'], dir: 'libs')    implementation fileTree(include: ['*.aar'], dir: 'libs')//    compileOnly fileTree(include: ['*.jar'], dir: 'apiLib')    testImplementation 'junit:junit:4.12'    androidTestImplementation 'androidx.test.ext:junit:1.1.1'    androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'//    implementation 'org.slf4j:slf4j-api:1.7.25'//    implementation "taokdao.api.shadow.dynamic:host:$shadow_version"//    implementation 'tiiehenry.taokdao.api:tkd-shadow-constant:1.0'//    implementation 'tiiehenry.android.dynamicloader:core_library:1.0'    implementation 'tiiehenry.taokdao.api:api_public:+'    implementation 'tiiehenry.taokdao